<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="Inner — immersive markdown editor" />
    <title>Inner</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme flash prevention — apply saved theme before first paint -->
    <script>
      ;(function() {
        var t = localStorage.getItem('inner:theme') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
        document.querySelector('meta[name="color-scheme"]').content = t
      })()
    </script>

    <!-- Font loading: preconnect + non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Core fonts: Inter (sans) + JetBrains Mono (mono) — trimmed to used weights -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- CJK font: Noto Serif SC — lazy loaded (large payload, only used in serif mode) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet" /></noscript>

    <style>
      /* Critical CSS — prevent flash of unstyled content */
      html, body {
        margin: 0;
        padding: 0;
        background: #050a0f;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      html[data-theme="light"], html[data-theme="light"] body {
        background: #f1f5f9;
      }
      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
